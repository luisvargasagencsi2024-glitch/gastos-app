<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="appAuth" class="auth-page hidden">
    <div class="auth-box">
      <h1>Control de Gastos</h1>
      <p class="auth-subtitle">Administra tus ingresos y gastos</p>

      <div id="loginForm">
        <h2>Iniciar sesión</h2>
        <div class="form-group">
          <label for="loginUsername">Usuario</label>
          <input type="text" id="loginUsername" autocomplete="username" maxlength="30">
        </div>
        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" autocomplete="current-password">
        </div>
        <p id="loginError" class="form-error hidden"></p>
        <button class="btn btn-primary btn-block" id="btnLogin">Entrar</button>
        <p class="auth-switch">¿No tienes cuenta? <a href="#" id="showRegister">Regístrate</a></p>
      </div>

      <div id="registerForm" class="hidden">
        <h2>Crear cuenta</h2>
        <div class="form-group">
          <label for="regUsername">Usuario</label>
          <input type="text" id="regUsername" autocomplete="username" maxlength="30">
        </div>
        <div class="form-group">
          <label for="regPassword">Contraseña</label>
          <input type="password" id="regPassword" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="regPassword2">Repetir contraseña</label>
          <input type="password" id="regPassword2" autocomplete="new-password">
        </div>
        <p id="regError" class="form-error hidden"></p>
        <button class="btn btn-primary btn-block" id="btnRegister">Crear cuenta</button>
        <p class="auth-switch">¿Ya tienes cuenta? <a href="#" id="showLogin">Inicia sesión</a></p>
      </div>
    </div>
  </div>

  <div id="appMain" class="app hidden">
    <header class="header">
      <div class="header-top">
        <h1>Control de Gastos</h1>
        <div class="header-right">
          <span class="header-user" id="headerUser"></span>
          <button class="btn btn-sm" id="btnLogout">Salir</button>
        </div>
      </div>
      <nav class="tabs">
        <button class="tab active" data-view="dashboard">Dashboard</button>
        <button class="tab" data-view="transactions">Transacciones</button>
        <button class="tab" data-view="budgets">Presupuestos</button>
        <button class="tab" data-view="reports">Reportes</button>
      </nav>
    </header>
    <main class="main">
      <div id="view-dashboard" class="view active"></div>
      <div id="view-transactions" class="view"></div>
      <div id="view-budgets" class="view"></div>
      <div id="view-reports" class="view"></div>
    </main>
  </div>

  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modalTitle">Nueva transacción</h2>
      <form id="transactionForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" required>
            <option value="income">Ingreso</option>
            <option value="expense">Gasto</option>
          </select>
        </div>
        <div class="form-group">
          <label for="monto">Monto (S/)</label>
          <input type="number" id="monto" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label for="categoria">Categoría</label>
          <select id="categoria" required></select>
        </div>
        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <input type="text" id="descripcion" maxlength="100">
        </div>
        <div class="form-group">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="budgetModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Editar presupuesto</h2>
      <form id="budgetForm">
        <input type="hidden" id="budgetCatId">
        <div class="form-group">
          <label for="budgetName">Categoría</label>
          <p id="budgetName" class="form-text"></p>
        </div>
        <div class="form-group">
          <label for="budgetAmount">Presupuesto mensual (S/)</label>
          <input type="number" id="budgetAmount" step="0.01" min="0" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="btnBudgetCancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
